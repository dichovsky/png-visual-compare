name: Tests on push
on:
    push:
        branches-ignore:
            - 'release/*'
permissions:
    contents: read
jobs:
    ubuntu:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Test on Ubuntu Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
            - name: Run tests
              run: npm run test:all
    windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6
            - name: Test on Windows Use Node.js 22.x
              uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
            - name: Run tests
              run: npm run test:all
